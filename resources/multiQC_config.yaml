title: "wgs_prism2 Sequence Production and QC Report"
subtitle: "TBD"


custom_logo: "resources/AgR-Colour.jpg"
custom_logo_title: "AgResearch"
custom_logo_url: "https://www.agresearch.co.nz"


report_header_info:
  - Contact E-mail: "ben.perry@agresearch.co.nz"
  - Application Type: "MGI Sequence QC"
  - Sequencing Platform: "MGI G99 / T1+"


ignore_images: false


# splitBarcode has no MultiQC module; its demultiplexing rates arrive as custom
# content from workflow/scripts/barcodestat_to_mqc.py.
custom_data:
  splitbarcode:
    section_name: "splitBarcode Demultiplexing"
    description: "Per-sample demultiplexing rates reported by MGI splitBarcode."
    plot_type: "table"


sp:
  splitbarcode:
    fn: "splitbarcode_mqc.tsv"


module_order:
  - fastqc:
      name: "FastQC of Raw Sequencing Reads"
      anchor: "fastqc_raw"
      # MGI reports are named <RUN>_<LANE>_<sample>_fastqc.zip. The previous
      # filter of "*001_fastqc*" matched Illumina's _S1_L001_R1_001 naming only,
      # and would silently drop every FastQC report from the report.
      path_filters:
        - "*_fastqc*"


section_comments:
  fastqc: "This section of the report shows FastQC results for fastq data."
