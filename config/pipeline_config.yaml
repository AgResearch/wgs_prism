### ###
# These will be overridden by parameters passed on the CLI via the --config flag
# It is recommended that these variables are mapped in the params: and not accessed directly through the config[] dictionary
### ###

### HPC data organsiation global variables; passed via --config in practise ###
# RUN must be passed via --config parameter at runtime
# The MGI flowcell ID, eg. FT150034703
# AKA. $RUN
RUN: "FT150034703"
# The lane to process. MGI G99 / T1+ writes one multiplexed fastq per lane.
# Multi-lane runs are future work; one lane is processed per invocation.
LANE: "L01"
# eg. /projects/2026_sequence_production_[a-z]/run_data/$RUN
# AKA. $SEQ_ROOT
# Derived inputs:
#   fastq    : {IN_ROOT}/{RUN}/{LANE}/{RUN}_{LANE}_read.fq.gz
#   run info : {IN_ROOT}/{RUN}/Metrics/{RUN}_RunInfoMetrics.csv
IN_ROOT: "/projects/2026_sequence_production_a/run_data"
# eg. /scratch/2026_sequence_production_[a-z]/postprocessing/mgi/$RUN
# AKA. $OUTPUT_ROOT
# OUT_ROOT must be passed via --config parameter at runtime
OUT_ROOT: "/scratch/2026_sequence_production_a/postprocessing/mgi"

# The Illumina-format sample sheet. Unlike Illumina runs this does not live in
# the run folder on MGI, so it is passed via --config at runtime.
SAMPLE_SHEET: "/projects/2023-bjp-sandbox/testing/samplesheets/FT150034703.csv"

### splitBarcode configuration ###
# Mismatches tolerated per barcode when demultiplexing.
barcode_mismatch: 1

### multiQC configuration ###
multiqc_config: "resources/multiQC_config.yaml"
